<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <h1 routerLink="/">FILMER</h1>
      <nav class="nav-menu">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/movies" routerLinkActive="active">Movies</a>
        <a routerLink="/tvshows" routerLinkActive="active">TV Shows</a>
        <a *ngIf="authState.user()" routerLink="/rentals" routerLinkActive="active">My Rentals</a>
        <a *ngIf="authState.user()" routerLink="/cart" routerLinkActive="active">Cart</a>
        <a *ngIf="authState.user()" routerLink="/orders" routerLinkActive="active">Orders</a>
        <a routerLink="/favorites" routerLinkActive="active">My List</a>
        <a *ngIf="!authState.user()" routerLink="/auth" routerLinkActive="active">Login</a>
        <button *ngIf="authState.user()" class="logout-btn" (click)="logout()">Logout</button>
      </nav>
    </div>
  </header>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <p>&copy; 2026 Filmer Movie Rental System. All rights reserved.</p>
  </footer>
</div>
