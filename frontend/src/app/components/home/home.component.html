<div class="home-container">
  <div class="hero-section">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title">Unlimited movies, TV shows, and more.</h1>
      <p class="hero-subtitle">Watch anywhere. Cancel anytime.</p>
      <div class="hero-actions">
        <button routerLink="/movies" class="btn btn-primary btn-lg rounded-0 px-5 py-3 fs-4 fw-bold shadow">
          Browse Movies <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="container py-5">
    <div class="row g-4">
      <div class="col-12 col-md-6 col-lg-3" *ngFor="let feature of features">
        <div class="feature-card h-100 p-4 bg-dark border border-secondary-subtle rounded-3">
          <h3 class="h5 mb-2">{{ feature.title }}</h3>
          <p class="text-light-emphasis mb-0">{{ feature.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
