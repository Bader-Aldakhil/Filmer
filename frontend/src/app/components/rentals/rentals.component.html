<div class="movies-container px-4">
  <div class="title-section mb-5 mt-2 d-flex justify-content-between align-items-center">
    <div>
      <h1 class="display-4 fw-bold text-white">My Rentals</h1>
      <p class="text-muted fs-5 mb-0">Purchased titles ready to watch</p>
    </div>
  </div>

  <div *ngIf="loading" class="alert alert-dark bg-transparent text-center border-0 text-muted my-5 py-5">
    <h4>Loading rentals...</h4>
  </div>

  <div *ngIf="error" class="alert alert-danger bg-danger text-white border-0">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error && items.length === 0"
    class="alert alert-dark bg-transparent text-center border-0 text-muted my-5 py-5">
    <h4>No rentals yet</h4>
    <p>Complete checkout to unlock playback here.</p>
    <a routerLink="/movies" class="btn btn-danger mt-2">Browse Movies</a>
  </div>

  <div *ngIf="!loading && !error && items.length > 0" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div class="col" *ngFor="let item of items">
      <div class="card bg-dark border-secondary text-white h-100">
        <div class="card-body">
          <h5 class="card-title mb-1">{{ item.title }}</h5>
          <p class="text-muted small mb-1">{{ item.year || 'Unknown year' }}</p>
          <p class="text-muted small mb-3">Purchased {{ item.lastPurchasedAt | date:'mediumDate' }}</p>
          <a class="btn btn-danger btn-sm" [routerLink]="['/watch', item.movieId]">Watch</a>
        </div>
      </div>
    </div>
  </div>
</div>
