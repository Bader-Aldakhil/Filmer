<div class="rentals-page px-4">

  <!-- ── Page header ── -->
  <div class="page-header mb-5 mt-2">
    <h1 class="page-title">My Library</h1>
    <p class="page-sub">Your purchased titles — watch ad-free, anytime.</p>
  </div>

  <!-- ── Loading ── -->
  <div *ngIf="loading" class="items-grid">
    <div class="rental-card skeleton" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="poster-area skeleton-box"></div>
      <div class="card-body">
        <div class="skeleton-line w-70 mb-2"></div>
        <div class="skeleton-line w-40 mb-4"></div>
        <div class="skeleton-line w-30"></div>
      </div>
    </div>
  </div>

  <!-- ── Error ── -->
  <div *ngIf="error" class="alert-panel error-panel">
    <i class="bi bi-exclamation-circle-fill me-2 text-danger"></i>
    {{ error }}
  </div>

  <!-- ── Empty state ── -->
  <div *ngIf="!loading && !error && items.length === 0" class="empty-state">
    <div class="empty-icon">🎬</div>
    <h3 class="empty-title">No titles yet</h3>
    <p class="empty-sub">Complete a checkout to unlock ad-free playback here.</p>
    <a routerLink="/movies" class="btn-cta">Browse Movies</a>
    <a routerLink="/tvshows" class="btn-cta btn-cta--outline ms-2">Browse TV Shows</a>
  </div>

  <!-- ── Library grid ── -->
  <div *ngIf="!loading && !error && items.length > 0" class="items-grid">
    <div class="rental-card" *ngFor="let item of items">

      <!-- Poster -->
      <div class="poster-area">
        <img
          *ngIf="posters[item.movieId]"
          [src]="posters[item.movieId]"
          [alt]="item.title"
          class="poster-img"
          loading="lazy" />
        <div *ngIf="!posters[item.movieId]" class="poster-placeholder">
          <i class="bi bi-film"></i>
        </div>

        <!-- Type badge -->
        <span class="type-badge" [class.badge-tv]="isSeries(item)" [class.badge-movie]="!isSeries(item)">
          {{ typeLabel(item) }}
        </span>

        <!-- Hover overlay with Watch button -->
        <div class="poster-overlay">
          <a [routerLink]="['/watch', item.movieId]" class="play-btn" [attr.aria-label]="'Watch ' + item.title">
            <i class="bi bi-play-fill"></i>
          </a>
        </div>
      </div>

      <!-- Card body -->
      <div class="card-body">
        <h2 class="card-title">{{ item.title }}</h2>
        <p class="card-meta">
          <span *ngIf="item.year">{{ item.year }}</span>
          <span *ngIf="item.lastPurchasedAt" class="dot-sep">·</span>
          <span *ngIf="item.lastPurchasedAt">{{ item.lastPurchasedAt | date:'MMM d, y' }}</span>
        </p>

        <a
          class="watch-btn"
          [routerLink]="['/watch', item.movieId]">
          <i class="bi bi-play-fill me-1"></i>
          Watch Now
        </a>
      </div>

    </div>
  </div>

</div>
