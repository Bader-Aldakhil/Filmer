version: '3.8'

services:
  # Spring Boot Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filmer-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/filmer
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      SSL_PASSWORD: ${SSL_PASSWORD}
      STREAMING_PROVIDER_SIGNING_SECRET: ${STREAMING_PROVIDER_SIGNING_SECRET}
      STREAMING_PROVIDER_MOVIE_TEMPLATE: https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4
      STREAMING_PROVIDER_SERIES_TEMPLATE: https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4
      STREAMING_PROVIDER_FALLBACK_MOVIE_TEMPLATE: https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4
      STREAMING_PROVIDER_FALLBACK_SERIES_TEMPLATE: https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4
    ports:
      - "8443:8443"
    networks:
      - filmer-network
    depends_on:
      postgres:
        condition: service_healthy

  # Node.js Torrent Streaming Service
  stream-server:
    build:
      context: ./stream-server
      dockerfile: Dockerfile
    container_name: filmer-stream
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - filmer-network

  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: filmer-postgres
    restart: unless-stopped
    environment:
      # Database credentials - these match the environment variables in application.properties
      POSTGRES_DB: filmer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
      # Auto-initialize schema on first run
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - filmer-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - Web-based PostgreSQL Management Tool
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: filmer-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - filmer-network
    depends_on:
      - postgres

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

# Network for service communication
networks:
  filmer-network:
    driver: bridge
