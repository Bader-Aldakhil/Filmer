name: Phase 3 CI Tests

on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run CSS Validation (Stylelint)
      run: npm run lint:css
    - name: Run frontend tests
      run: npm test -- --watch=false --browsers=ChromeHeadless

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run backend unit and web tests
      run: mvn -B test -Dtest='com.filmer.controller.*Test,com.filmer.service.*Test'

  contract-tests-allowed-to-fail:
    runs-on: ubuntu-latest
    continue-on-error: true # Allowed to fail for Phase 3
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: filmer
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d filmer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run Contract Tests (allowed to fail)
      env:
        DB_URL: jdbc:postgresql://localhost:5432/filmer
        DB_USER: postgres
        DB_PASSWORD: postgres
      run: mvn -B test -Dtest='*ContractTest' || true
