name: Phase 3 CI Tests

on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run frontend tests
      run: npm test -- --watch=false --browsers=ChromeHeadless

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Start PostgreSQL Service
      run: |
        docker run -d --name postgres -p 5432:5432 -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=filmer postgres:15
    - name: Wait for PostgreSQL to be ready
      run: |
        echo "Waiting for PostgreSQL to be ready..."
        for i in {1..30}; do
          if docker exec postgres pg_isready -U postgres; then
            echo "PostgreSQL is ready!"
            break
          fi
          echo "Attempt $i/30 - PostgreSQL not ready yet, waiting 2 seconds..."
          sleep 2
        done
    - name: Run backend tests
      env:
        DB_URL: jdbc:postgresql://localhost:5432/filmer
        DB_USER: postgres
        DB_PASSWORD: postgres
      run: mvn -B test

  contract-tests-allowed-to-fail:
    runs-on: ubuntu-latest
    continue-on-error: true # Allowed to fail for Phase 3
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Start PostgreSQL Service
      run: |
        docker run -d --name postgres -p 5432:5432 -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=filmer postgres:15
    - name: Wait for PostgreSQL to be ready
      run: |
        echo "Waiting for PostgreSQL to be ready..."
        for i in {1..30}; do
          if docker exec postgres pg_isready -U postgres; then
            echo "PostgreSQL is ready!"
            break
          fi
          echo "Attempt $i/30 - PostgreSQL not ready yet, waiting 2 seconds..."
          sleep 2
        done
    - name: Run Contract Tests
      env:
        DB_URL: jdbc:postgresql://localhost:5432/filmer
        DB_USER: postgres
        DB_PASSWORD: postgres
      run: mvn -B test -Dtest=*ContractTest
