name: PR Governance

on:
  pull_request:
    branches: [ "main", "master" ]
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    branches: [ "main", "master" ]
    types: [submitted, edited, dismissed]

permissions:
  pull-requests: read
  contents: read

jobs:
  approval-gate:
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
    - name: Enforce minimum 2 approvals
      uses: actions/github-script@v7
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const prNumber = context.payload.pull_request.number;

          const { data: reviews } = await github.rest.pulls.listReviews({
            owner,
            repo,
            pull_number: prNumber,
            per_page: 100
          });

          const latestStateByUser = new Map();
          for (const review of reviews) {
            latestStateByUser.set(review.user.login, review.state);
          }

          const approvals = [...latestStateByUser.values()].filter(s => s === 'APPROVED').length;

          core.info(`Current unique approvals: ${approvals}`);
          if (approvals < 2) {
            core.setFailed(`At least 2 approvals are required. Current approvals: ${approvals}`);
          }
